<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL SHOW DE IVAN | Artista</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="container">
<header class="hero">
    <div class="hero-text">
        <h1>El Show de <span>Ivan</span></h1>
        <p>SHOWMAN / CANTANTE / ARTISTA</p>
    </div>

    <div class="hero-image">
        <img src="Foto-Ivan-logo.png" alt="Ivan">
    </div>
</header>

<section class="collage-grid">
    <img src="foto-ivan-4.jpeg" alt="espectaculo">
    <img src="fotos-ivan2.JPG" alt="concierto">
    <img src="fotos-ivan.jpg" alt="actuación fallas">
    <img src="foto-ivan-3.png" alt="testigos">

</section>

<main class="shows-container">

    <h2 class="title-section">Experiencias Musicales</h2>

    <div class="shows-list">
        <script>
            const shows = [
                {n:"Acústico en guitarra",d:"Perfecto para amenizar tus eventos chill en bares terrazas..etc",p:"300€"},
                {n:"Taburete romántico",d:"Perfecto para celebrar el amor de cualquier forma",p:"500€"},
                {n:"Todos a bailar",d:"A bailar al ritmo de la música para todas las generaciones, incluye coreografia",p:"450€"},
                {n:"Aquellos años 60",d:"Para nuestros mayores, paso doble, bolero, baile en linia, bachata..etc",p:"400€"},
                {n:"Para los peques",d:"Bailes, magia, malavares, coreografias, globoflexia (desde 5 años)",p:"550€"},
                {n:"Karaoke todos a cantar",d:"Servicio de karaoke para todos los públicos ¡Con premio a la mejor voz!",p:"350€"},
                {n:"DJ. Todos los gèneros",d:"Música a medida.",p:"600€"},
                {n:"Monologo/chistes",d:"¡Vamos a reirnos un rato! (mayores de 18 años)",p:"450€"},
                {n:"Spiker/maestro de ceremonias",d:"amenizamos tu evento y lo conducimos como un presentador de televisión",p:"700€"},
                {n:"MHVC Producciones",d:" POSARACÍ EM FALTA ALGO PER",p:"300€"},
                {n:"XE QUIN EMPASTRE",d:"ACÍ EM FALTA ALGO PER"},
                {n:"¡Pide por esa boquita!",d:"Cuéntanos que buscas para tu evento y te aconsejamos"}
            ];

            shows.forEach(s=>{
                document.write(`
                    <div class="show-row" onclick="openModal('${s.n}','${s.d}')">
                        <div class="show-info">
                            <h3>${s.n}</h3>
                            <p>${s.d}</p>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

</main>

<!-- MODAL -->
<div id="showModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
    </div>
</div>

<footer>
    <p>showdeivan@gmail.com | +34 659 74 90 79</p>
</footer>

<script>
function openModal(t,d){
    document.getElementById('modalTitle').innerText = t;
    document.getElementById('modalDesc').innerText = d;
    document.getElementById('showModal').style.display="flex";
}
function closeModal(){
    document.getElementById('showModal').style.display="none";
}
</script>
</div>
</body>
</html>
